<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速点名器</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 布局容器 */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.8);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: rgba(99, 102, 241, 1);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.8);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 1);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 旋转动画容器 */
        #spinner-container {
            width: 200px;
            height: 200px;
            position: relative;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #6366f1 0deg,
                #8b5cf6 90deg,
                #6366f1 180deg,
                #8b5cf6 270deg,
                #6366f1 360deg
            );
            animation: spin 3s linear infinite;
        }

        .spinner.fast {
            animation: spin 0.3s linear infinite;
        }

        .spinner.stopping {
            animation: spin-stop 1s ease-out forwards;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-stop {
            from { transform: rotate(0deg); }
            to { transform: rotate(1080deg); }
        }

        /* 内圆 */
        .spinner-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 姓名显示 */
        .name-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
        }

        .student-name {
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.8),
                         0 0 60px rgba(99, 102, 241, 0.4);
            opacity: 0;
            transform: scale(0);
            transition: all 0.6s ease-out;
        }

        .student-name.show {
            opacity: 1;
            transform: scale(1);
        }

        /* 状态选择按钮 */
        .status-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .status-buttons.show {
            opacity: 1;
            pointer-events: auto;
        }

        .status-btn {
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .status-btn.normal {
            background: rgba(34, 197, 94, 0.8);
        }

        .status-btn.late {
            background: rgba(251, 191, 36, 0.8);
        }

        .status-btn.absent {
            background: rgba(239, 68, 68, 0.8);
        }

        .status-btn:hover {
            transform: scale(1.05);
            border-color: #fff;
        }

        /* 主点名按钮 */
        .main-button-container {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        #start-btn {
            padding: 20px 60px;
            font-size: 24px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            transition: all 0.3s;
        }

        #start-btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6);
        }

        #start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 底部统计栏 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
        }

        .stat-item {
            display: flex;
            gap: 8px;
        }

        .stat-value {
            color: #8b5cf6;
            font-weight: bold;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
        }

        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        /* 学生列表项 */
        .student-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .student-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .student-late-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .student-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 添加学生表单 */
        .add-student-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-student-form input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
        }

        .add-student-form input:focus {
            outline: none;
            border-color: #6366f1;
        }

        /* 记录列表 */
        .records-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .record-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .record-status.normal {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .record-status.late {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .record-status.absent {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* 确认弹窗 */
        .confirm-dialog {
            text-align: center;
        }

        .confirm-dialog p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* 通知提示 */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(34, 197, 94, 0.9);
            color: #fff;
            border-radius: 8px;
            z-index: 200;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        /* 加载状态 */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="btn" id="start-btn">开始点名</button>
            <button class="btn" id="manage-students-btn">名单管理</button>
            <button class="btn" id="view-records-btn">查看记录</button>
            <button class="btn" id="export-btn">导出记录</button>
            <button class="btn" id="reset-late-btn">重置迟到</button>
            <button class="btn btn-danger" id="clear-data-btn">清空数据</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 旋转动画 -->
            <div id="spinner-container">
                <div class="spinner" id="spinner">
                    <div class="spinner-inner"></div>
                </div>
            </div>

            <!-- 姓名显示 -->
            <div class="name-display">
                <div class="student-name" id="student-name"></div>
                <div class="status-buttons" id="status-buttons">
                    <button class="status-btn normal" data-status="normal">正常</button>
                    <button class="status-btn late" data-status="late">迟到</button>
                    <button class="status-btn absent" data-status="absent">缺勤</button>
                </div>
            </div>
        </div>

        <!-- 底部统计 -->
        <div class="stats-bar">
            <div class="stat-item">今日: <span class="stat-value" id="today-count">0</span> / <span class="stat-value" id="total-count">0</span></div>
            <div class="stat-item">迟到: <span class="stat-value" id="late-count">0</span></div>
        </div>
    </div>

    <!-- 名单管理弹窗 -->
    <div class="modal" id="students-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">学生名单</h2>
                <button class="modal-close" id="close-students-btn">&times;</button>
            </div>
            <div class="add-student-form">
                <input type="text" id="new-student-name" placeholder="输入学生姓名" maxlength="10">
                <button class="btn" id="add-student-btn">添加</button>
            </div>
            <div class="student-list" id="student-list">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 记录弹窗 -->
    <div class="modal" id="records-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">点名记录</h2>
                <button class="modal-close" id="close-records-btn">&times;</button>
            </div>
            <div class="records-list" id="records-list">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <div class="confirm-dialog">
                <p id="confirm-message">确认操作？</p>
                <div class="confirm-buttons">
                    <button class="btn" id="confirm-cancel">取消</button>
                    <button class="btn btn-danger" id="confirm-ok">确认</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div class="toast" id="toast"></div>

    <!-- 加载状态 -->
    <div class="loading" id="loading">初始化中...</div>

    <script>
        // ==================== Utils ====================
        const Utils = {
            // 生成 UUID
            generateId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            },

            // 格式化日期时间
            formatDateTime(timestamp) {
                const date = new Date(timestamp);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            },

            // 获取今日日期字符串
            getTodayString() {
                const date = new Date();
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            },

            // 显示通知
            showToast(message, isError = false) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = isError ? 'toast show error' : 'toast show';
                setTimeout(() => {
                    toast.className = 'toast';
                }, 3000);
            }
        };

        // ==================== Initial Students ====================
        const INITIAL_STUDENTS = [
            "张伟", "李娜", "王芳", "刘洋", "陈杰",
            "杨秀英", "赵强", "黄敏", "周涛", "吴磊",
            "徐静", "孙红", "马超", "朱丽", "胡勇",
            "郭丹", "何平", "罗琳", "林峰", "高明"
        ];

        // ==================== StorageService ====================
        const StorageService = {
            dbName: 'ClassRollCallDB',
            dbVersion: 1,
            db: null,
            useLocalStorage: false,

            // 初始化数据库
            async init() {
                try {
                    const request = indexedDB.open(this.dbName, this.dbVersion);

                    return new Promise((resolve, reject) => {
                        request.onerror = () => {
                            console.warn('IndexedDB 不可用，降级到 localStorage');
                            this.useLocalStorage = true;
                            this.initLocalStorage();
                            this.initMockData().then(resolve);
                        };

                        request.onsuccess = (e) => {
                            this.db = e.target.result;
                            this.initMockData().then(resolve);
                        };

                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;

                            // 创建 students 对象存储
                            if (!db.objectStoreNames.contains('students')) {
                                const studentStore = db.createObjectStore('students', { keyPath: 'id' });
                                studentStore.createIndex('name', 'name', { unique: false });
                            }

                            // 创建 records 对象存储
                            if (!db.objectStoreNames.contains('records')) {
                                const recordStore = db.createObjectStore('records', { keyPath: 'id' });
                                recordStore.createIndex('timestamp', 'timestamp', { unique: false });
                            }
                        };
                    });
                } catch (error) {
                    console.warn('IndexedDB 初始化失败，降级到 localStorage', error);
                    this.useLocalStorage = true;
                    this.initLocalStorage();
                    await this.initMockData();
                }
            },

            // 初始化 localStorage
            initLocalStorage() {
                if (!localStorage.getItem('students')) {
                    localStorage.setItem('students', JSON.stringify([]));
                }
                if (!localStorage.getItem('records')) {
                    localStorage.setItem('records', JSON.stringify([]));
                }
            },

            // 初始化模拟数据
            async initMockData() {
                const students = await this.getAllStudents();
                if (students.length === 0) {
                    const now = Date.now();
                    const mockData = INITIAL_STUDENTS.map(name => ({
                        id: Utils.generateId(),
                        name: name,
                        lateCount: 0,
                        createdAt: now
                    }));
                    await this.addStudents(mockData);
                    console.log(`已初始化 ${mockData.length} 名学生`);
                }
            },

            // IndexedDB 通用操作
            async idbOperation(storeName, mode, operation) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, mode);
                    const store = transaction.objectStore(storeName);
                    const request = operation(store);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            // 添加学生
            async addStudents(students) {
                if (this.useLocalStorage) {
                    const existing = JSON.parse(localStorage.getItem('students') || '[]');
                    const updated = [...existing, ...students];
                    localStorage.setItem('students', JSON.stringify(updated));
                    return;
                }

                for (const student of students) {
                    await this.idbOperation('students', 'readwrite', store => store.add(student));
                }
            },

            // 获取所有学生
            async getAllStudents() {
                if (this.useLocalStorage) {
                    return JSON.parse(localStorage.getItem('students') || '[]');
                }

                return this.idbOperation('students', 'readonly', store => store.getAll());
            },

            // 更新学生
            async updateStudent(student) {
                if (this.useLocalStorage) {
                    const students = JSON.parse(localStorage.getItem('students') || '[]');
                    const index = students.findIndex(s => s.id === student.id);
                    if (index !== -1) {
                        students[index] = student;
                        localStorage.setItem('students', JSON.stringify(students));
                    }
                    return;
                }

                await this.idbOperation('students', 'readwrite', store => store.put(student));
            },

            // 删除学生
            async deleteStudent(studentId) {
                if (this.useLocalStorage) {
                    const students = JSON.parse(localStorage.getItem('students') || '[]');
                    const filtered = students.filter(s => s.id !== studentId);
                    localStorage.setItem('students', JSON.stringify(filtered));
                    return;
                }

                await this.idbOperation('students', 'readwrite', store => store.delete(studentId));
            },

            // 添加记录
            async addRecord(record) {
                if (this.useLocalStorage) {
                    const records = JSON.parse(localStorage.getItem('records') || '[]');
                    records.push(record);
                    localStorage.setItem('records', JSON.stringify(records));
                    return;
                }

                await this.idbOperation('records', 'readwrite', store => store.add(record));
            },

            // 获取所有记录
            async getAllRecords() {
                if (this.useLocalStorage) {
                    return JSON.parse(localStorage.getItem('records') || '[]');
                }

                const records = await this.idbOperation('records', 'readonly', store => store.getAll());
                return records.sort((a, b) => b.timestamp - a.timestamp);
            },

            // 获取今日记录
            async getTodayRecords() {
                const allRecords = await this.getAllRecords();
                const now = new Date();
                const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const todayEnd = todayStart + 24 * 60 * 60 * 1000;

                return allRecords.filter(r => r.timestamp >= todayStart && r.timestamp < todayEnd);
            },

            // 清空所有数据
            async clearAll() {
                if (this.useLocalStorage) {
                    localStorage.removeItem('students');
                    localStorage.removeItem('records');
                    await this.initMockData();
                    return;
                }

                await this.idbOperation('students', 'readwrite', store => store.clear());
                await this.idbOperation('records', 'readwrite', store => store.clear());
                await this.initMockData();
            },

            // 重置迟到计数
            async resetLateCounts() {
                const students = await this.getAllStudents();
                for (const student of students) {
                    student.lateCount = 0;
                    await this.updateStudent(student);
                }
            }
        };
    </script>
</body>
</html>
