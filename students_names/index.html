<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速点名器 - 3D地球版</title>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 布局容器 */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.8);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: rgba(99, 102, 241, 1);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.8);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 1);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 3D地球容器 */
        #earth-container {
            width: 300px;
            height: 300px;
            position: relative;
        }

        #earth-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 姓名显示 */
        .name-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .student-name {
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.8),
                         0 0 60px rgba(99, 102, 241, 0.4),
                         0 0 100px rgba(139, 92, 246, 0.6);
            opacity: 0;
            visibility: hidden;
            transform: scale(0);
            transition: all 0.6s ease-out;
        }

        .student-name.show {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* 状态选择按钮 */
        .status-buttons {
            position: absolute;
            top: 280px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 320px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .status-buttons.show {
            opacity: 1;
            pointer-events: auto;
        }

        .status-btn {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            flex: 0 0 calc(50% - 5px);
            text-align: center;
        }

        .status-btn.normal {
            background: rgba(34, 197, 94, 0.8);
        }

        .status-btn.late {
            background: rgba(251, 191, 36, 0.8);
        }

        .status-btn.absent {
            background: rgba(239, 68, 68, 0.8);
        }

        .status-btn:hover {
            transform: scale(1.05);
            border-color: #fff;
        }

        /* 底部统计栏 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
            z-index: 100;
        }

        .stat-item {
            display: flex;
            gap: 8px;
        }

        .stat-value {
            color: #8b5cf6;
            font-weight: bold;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
        }

        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }

        /* 学生列表项 */
        .student-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .student-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .student-late-badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .student-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 添加学生表单 */
        .add-student-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-student-form input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
        }

        .add-student-form input:focus {
            outline: none;
            border-color: #6366f1;
        }

        /* 记录列表 */
        .records-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .record-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .record-status.normal {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .record-status.late {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .record-status.absent {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* 确认弹窗 */
        .confirm-dialog {
            text-align: center;
        }

        .confirm-dialog p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* 通知提示 */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(34, 197, 94, 0.9);
            color: #fff;
            border-radius: 8px;
            z-index: 200;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        /* 加载状态 */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            z-index: 50;
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <div id="app">
        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="btn" id="start-btn">开始点名</button>
            <button class="btn" id="manage-students-btn">名单管理</button>
            <button class="btn" id="view-records-btn">查看记录</button>
            <button class="btn" id="export-btn">导出记录</button>
            <button class="btn" id="reset-late-btn">重置迟到</button>
            <button class="btn btn-danger" id="clear-data-btn">清空数据</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 3D地球 -->
            <div id="earth-container">
                <canvas id="earth-canvas"></canvas>
            </div>

            <!-- 姓名显示 -->
            <div class="name-display">
                <div class="student-name" id="student-name"></div>
            </div>

            <!-- 状态选择按钮 -->
            <div class="status-buttons" id="status-buttons">
                <button class="status-btn normal" data-status="normal">正常</button>
                <button class="status-btn late" data-status="late">迟到</button>
                <button class="status-btn absent" data-status="absent">缺勤</button>
            </div>
        </div>

        <!-- 底部统计 -->
        <div class="stats-bar">
            <div class="stat-item">今日: <span class="stat-value" id="today-count">0</span> / <span class="stat-value" id="total-count">0</span></div>
            <div class="stat-item">迟到: <span class="stat-value" id="late-count">0</span></div>
        </div>
    </div>

    <!-- 名单管理弹窗 -->
    <div class="modal" id="students-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">学生名单</h2>
                <button class="modal-close" id="close-students-btn">&times;</button>
            </div>
            <div class="add-student-form">
                <input type="text" id="new-student-name" placeholder="输入学生姓名" maxlength="10">
                <button class="btn" id="add-student-btn">添加</button>
            </div>
            <div class="student-list" id="student-list">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 记录弹窗 -->
    <div class="modal" id="records-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">点名记录</h2>
                <button class="modal-close" id="close-records-btn">&times;</button>
            </div>
            <div class="records-list" id="records-list">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <div class="confirm-dialog">
                <p id="confirm-message">确认操作？</p>
                <div class="confirm-buttons">
                    <button class="btn" id="confirm-cancel">取消</button>
                    <button class="btn btn-danger" id="confirm-ok">确认</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div class="toast" id="toast"></div>

    <!-- 加载状态 -->
    <div class="loading" id="loading">初始化中...</div>

    <script>
        // ==================== 星星背景 ====================
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // ==================== 3D地球控制器 ====================
        const EarthController = {
            scene: null,
            camera: null,
            renderer: null,
            earth: null,
            atmosphere: null,
            clouds: null,
            stars: null,
            animationId: null,
            rotationSpeed: 0.002,
            targetRotationSpeed: 0.002,
            isInitialized: false,

            init() {
                const container = document.getElementById('earth-container');
                const canvas = document.getElementById('earth-canvas');

                // 创建场景
                this.scene = new THREE.Scene();

                // 创建相机
                this.camera = new THREE.PerspectiveCamera(
                    45,
                    container.clientWidth / container.clientHeight,
                    0.1,
                    1000
                );
                this.camera.position.z = 3;

                // 创建渲染器
                this.renderer = new THREE.WebGLRenderer({
                    canvas: canvas,
                    antialias: true,
                    alpha: true
                });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);

                // 创建地球
                this.createEarth();
                this.createAtmosphere();
                this.createStars();

                // 添加光源
                const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
                this.scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(5, 3, 5);
                this.scene.add(directionalLight);

                const backLight = new THREE.DirectionalLight(0x6366f1, 0.5);
                backLight.position.set(-5, -3, -5);
                this.scene.add(backLight);

                // 开始动画
                this.animate();
                this.isInitialized = true;

                // 处理窗口大小变化
                window.addEventListener('resize', () => this.onResize());
            },

            createEarth() {
                const textureLoader = new THREE.TextureLoader();

                // 创建地球几何体
                const geometry = new THREE.SphereGeometry(1, 64, 64);

                // 加载地球纹理
                const earthTexture = textureLoader.load(
                    'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
                    undefined,
                    undefined,
                    (error) => {
                        // 如果纹理加载失败，使用程序化生成的纹理
                        console.warn('Earth texture loading failed, using procedural texture');
                        this.createProceduralEarth(geometry);
                    }
                );

                // 创建地球材质
                const material = new THREE.MeshPhongMaterial({
                    map: earthTexture,
                    specular: new THREE.Color(0x333333),
                    shininess: 5
                });

                this.earth = new THREE.Mesh(geometry, material);
                this.scene.add(this.earth);

                // 添加云层
                this.createClouds();
            },

            createProceduralEarth(geometry) {
                // 程序化生成地球纹理（备用方案）
                const canvas = document.createElement('canvas');
                canvas.width = 2048;
                canvas.height = 1024;
                const ctx = canvas.getContext('2d');

                // 海洋背景
                const oceanGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                oceanGradient.addColorStop(0, '#1a4d7c');
                oceanGradient.addColorStop(0.5, '#0d6efd');
                oceanGradient.addColorStop(1, '#1a4d7c');
                ctx.fillStyle = oceanGradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 绘制简化的大陆
                ctx.fillStyle = '#3d8c40';
                // 北美
                this.drawContinent(ctx, 200, 200, 300, 200);
                // 南美
                this.drawContinent(ctx, 350, 500, 150, 250);
                // 欧洲
                this.drawContinent(ctx, 900, 180, 200, 150);
                // 非洲
                this.drawContinent(ctx, 950, 350, 250, 300);
                // 亚洲
                this.drawContinent(ctx, 1100, 150, 400, 250);
                // 澳洲
                this.drawContinent(ctx, 1450, 550, 180, 120);

                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.MeshPhongMaterial({
                    map: texture,
                    specular: new THREE.Color(0x333333),
                    shininess: 5
                });
                this.earth.material = material;
            },

            drawContinent(ctx, x, y, width, height) {
                ctx.beginPath();
                ctx.ellipse(x, y, width/2, height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                // 添加一些随机变化
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.ellipse(
                        x + (Math.random() - 0.5) * width,
                        y + (Math.random() - 0.5) * height,
                        width/4 * Math.random(),
                        height/4 * Math.random(),
                        Math.random() * Math.PI,
                        0, Math.PI * 2
                    );
                    ctx.fill();
                }
            },

            createClouds() {
                // 创建云层
                const cloudGeometry = new THREE.SphereGeometry(1.02, 64, 64);
                const cloudMaterial = new THREE.MeshPhongMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.3,
                    side: THREE.DoubleSide
                });

                this.clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
                this.scene.add(this.clouds);
            },

            addGridLines() {
                const gridMaterial = new THREE.LineBasicMaterial({
                    color: 0x4a9eff,
                    transparent: true,
                    opacity: 0.3
                });

                // 纬线
                for (let i = -80; i <= 80; i += 20) {
                    const radius = Math.cos(i * Math.PI / 180);
                    const y = Math.sin(i * Math.PI / 180);
                    const points = [];
                    for (let j = 0; j <= 360; j += 10) {
                        const x = radius * Math.cos(j * Math.PI / 180);
                        const z = radius * Math.sin(j * Math.PI / 180);
                        points.push(new THREE.Vector3(x * 1.01, y * 1.01, z * 1.01));
                    }
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(geometry, gridMaterial);
                    this.earth.add(line);
                }

                // 经线
                for (let i = 0; i < 360; i += 30) {
                    const points = [];
                    for (let j = -90; j <= 90; j += 5) {
                        const radius = Math.cos(j * Math.PI / 180);
                        const y = Math.sin(j * Math.PI / 180);
                        const x = radius * Math.cos(i * Math.PI / 180);
                        const z = radius * Math.sin(i * Math.PI / 180);
                        points.push(new THREE.Vector3(x * 1.01, y * 1.01, z * 1.01));
                    }
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(geometry, gridMaterial);
                    this.earth.add(line);
                }
            },

            createAtmosphere() {
                // 大气层光晕
                const geometry = new THREE.SphereGeometry(1.15, 64, 64);
                const material = new THREE.ShaderMaterial({
                    vertexShader: `
                        varying vec3 vNormal;
                        void main() {
                            vNormal = normalize(normalMatrix * normal);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vNormal;
                        void main() {
                            float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                            gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    side: THREE.BackSide,
                    transparent: true
                });

                this.atmosphere = new THREE.Mesh(geometry, material);
                this.scene.add(this.atmosphere);

                // 内层发光
                const glowGeometry = new THREE.SphereGeometry(1.02, 64, 64);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: 0x6366f1,
                    transparent: true,
                    opacity: 0.1
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                this.scene.add(glow);
            },

            createStars() {
                const starsGeometry = new THREE.BufferGeometry();
                const starsMaterial = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 0.02,
                    transparent: true,
                    opacity: 0.8
                });

                const starsVertices = [];
                for (let i = 0; i < 1000; i++) {
                    const x = (Math.random() - 0.5) * 100;
                    const y = (Math.random() - 0.5) * 100;
                    const z = (Math.random() - 0.5) * 100;
                    starsVertices.push(x, y, z);
                }

                starsGeometry.setAttribute('position',
                    new THREE.Float32BufferAttribute(starsVertices, 3)
                );

                this.stars = new THREE.Points(starsGeometry, starsMaterial);
                this.scene.add(this.stars);
            },

            animate() {
                this.animationId = requestAnimationFrame(() => this.animate());

                // 平滑过渡旋转速度
                this.rotationSpeed += (this.targetRotationSpeed - this.rotationSpeed) * 0.05;

                // 旋转地球
                if (this.earth) {
                    this.earth.rotation.y += this.rotationSpeed;
                }

                // 旋转云层（稍微快一点）
                if (this.clouds) {
                    this.clouds.rotation.y += this.rotationSpeed * 1.1;
                }

                // 旋转大气层
                if (this.atmosphere) {
                    this.atmosphere.rotation.y += this.rotationSpeed * 0.5;
                }

                // 缓慢旋转星星
                if (this.stars) {
                    this.stars.rotation.y += 0.0001;
                }

                this.renderer.render(this.scene, this.camera);
            },

            setRotationSpeed(speed) {
                this.targetRotationSpeed = speed;
            },

            pulseEarth() {
                if (!this.earth) return;

                const startScale = this.earth.scale.x;
                const targetScale = 1.1;
                const duration = 500;
                const startTime = Date.now();

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);

                    // 使用easeInOutQuad
                    const eased = progress < 0.5
                        ? 2 * progress * progress
                        : 1 - Math.pow(-2 * progress + 2, 2) / 2;

                    const scale = startScale + (targetScale - startScale) * eased;
                    this.earth.scale.set(scale, scale, scale);

                    if (progress < 0.5) {
                        requestAnimationFrame(animate);
                    } else {
                        // 返回正常大小
                        const returnAnimate = () => {
                            const elapsed = Date.now() - startTime;
                            const returnProgress = Math.min((elapsed - duration / 2) / (duration / 2), 1);
                            const returnEased = 1 - Math.pow(1 - returnProgress, 3);
                            const scale = targetScale - (targetScale - startScale) * returnEased;
                            this.earth.scale.set(scale, scale, scale);

                            if (returnProgress < 1) {
                                requestAnimationFrame(returnAnimate);
                            }
                        };
                        returnAnimate();
                    }
                };
                animate();
            },

            highlightEarth(color) {
                if (!this.earth) return;

                const originalColor = this.earth.material.color.getHex();
                this.earth.material.color.setHex(color);

                setTimeout(() => {
                    this.earth.material.color.setHex(originalColor);
                }, 500);
            },

            onResize() {
                const container = document.getElementById('earth-container');
                if (!container || !this.camera || !this.renderer) return;

                this.camera.aspect = container.clientWidth / container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(container.clientWidth, container.clientHeight);
            }
        };

        // ==================== Utils ====================
        const Utils = {
            generateId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            },

            formatDateTime(timestamp) {
                const date = new Date(timestamp);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            },

            getTodayString() {
                const date = new Date();
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            },

            showToast(message, isError = false) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = isError ? 'toast show error' : 'toast show';
                setTimeout(() => {
                    toast.className = 'toast';
                }, 3000);
            }
        };

        // ==================== Initial Students ====================
        const INITIAL_STUDENTS = [
            "张伟", "李娜", "王芳", "刘洋", "陈杰",
            "杨秀英", "赵强", "黄敏", "周涛", "吴磊",
            "徐静", "孙红", "马超", "朱丽", "胡勇",
            "郭丹", "何平", "罗琳", "林峰", "高明"
        ];

        // ==================== StorageService ====================
        const StorageService = {
            dbName: 'ClassRollCallDB',
            dbVersion: 1,
            db: null,
            useLocalStorage: false,

            async init() {
                try {
                    const request = indexedDB.open(this.dbName, this.dbVersion);

                    return new Promise((resolve, reject) => {
                        request.onerror = () => {
                            console.warn('IndexedDB 不可用，降级到 localStorage');
                            this.useLocalStorage = true;
                            this.initLocalStorage();
                            this.initMockData().then(resolve);
                        };

                        request.onsuccess = (e) => {
                            this.db = e.target.result;
                            this.initMockData().then(resolve);
                        };

                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;

                            if (!db.objectStoreNames.contains('students')) {
                                const studentStore = db.createObjectStore('students', { keyPath: 'id' });
                                studentStore.createIndex('name', 'name', { unique: false });
                            }

                            if (!db.objectStoreNames.contains('records')) {
                                const recordStore = db.createObjectStore('records', { keyPath: 'id' });
                                recordStore.createIndex('timestamp', 'timestamp', { unique: false });
                            }
                        };
                    });
                } catch (error) {
                    console.warn('IndexedDB 初始化失败，降级到 localStorage', error);
                    this.useLocalStorage = true;
                    this.initLocalStorage();
                    await this.initMockData();
                }
            },

            initLocalStorage() {
                if (!localStorage.getItem('students')) {
                    localStorage.setItem('students', JSON.stringify([]));
                }
                if (!localStorage.getItem('records')) {
                    localStorage.setItem('records', JSON.stringify([]));
                }
            },

            async initMockData() {
                const students = await this.getAllStudents();
                if (students.length === 0) {
                    const now = Date.now();
                    const mockData = INITIAL_STUDENTS.map(name => ({
                        id: Utils.generateId(),
                        name: name,
                        lateCount: 0,
                        createdAt: now
                    }));
                    await this.addStudents(mockData);
                    console.log(`已初始化 ${mockData.length} 名学生`);
                }
            },

            async idbOperation(storeName, mode, operation) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, mode);
                    const store = transaction.objectStore(storeName);
                    const request = operation(store);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async addStudents(students) {
                if (this.useLocalStorage) {
                    const existing = JSON.parse(localStorage.getItem('students') || '[]');
                    const updated = [...existing, ...students];
                    localStorage.setItem('students', JSON.stringify(updated));
                    return;
                }

                for (const student of students) {
                    await this.idbOperation('students', 'readwrite', store => store.add(student));
                }
            },

            async getAllStudents() {
                if (this.useLocalStorage) {
                    return JSON.parse(localStorage.getItem('students') || '[]');
                }

                return this.idbOperation('students', 'readonly', store => store.getAll());
            },

            async updateStudent(student) {
                if (this.useLocalStorage) {
                    const students = JSON.parse(localStorage.getItem('students') || '[]');
                    const index = students.findIndex(s => s.id === student.id);
                    if (index !== -1) {
                        students[index] = student;
                        localStorage.setItem('students', JSON.stringify(students));
                    }
                    return;
                }

                await this.idbOperation('students', 'readwrite', store => store.put(student));
            },

            async deleteStudent(studentId) {
                if (this.useLocalStorage) {
                    const students = JSON.parse(localStorage.getItem('students') || '[]');
                    const filtered = students.filter(s => s.id !== studentId);
                    localStorage.setItem('students', JSON.stringify(filtered));
                    return;
                }

                await this.idbOperation('students', 'readwrite', store => store.delete(studentId));
            },

            async addRecord(record) {
                if (this.useLocalStorage) {
                    const records = JSON.parse(localStorage.getItem('records') || '[]');
                    records.push(record);
                    localStorage.setItem('records', JSON.stringify(records));
                    return;
                }

                await this.idbOperation('records', 'readwrite', store => store.add(record));
            },

            async getAllRecords() {
                if (this.useLocalStorage) {
                    return JSON.parse(localStorage.getItem('records') || '[]');
                }

                const records = await this.idbOperation('records', 'readonly', store => store.getAll());
                return records.sort((a, b) => b.timestamp - a.timestamp);
            },

            async getTodayRecords() {
                const allRecords = await this.getAllRecords();
                const now = new Date();
                const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const todayEnd = todayStart + 24 * 60 * 60 * 1000;

                return allRecords.filter(r => r.timestamp >= todayStart && r.timestamp < todayEnd);
            },

            async clearAll() {
                if (this.useLocalStorage) {
                    localStorage.removeItem('students');
                    localStorage.removeItem('records');
                    await this.initMockData();
                    return;
                }

                await this.idbOperation('students', 'readwrite', store => store.clear());
                await this.idbOperation('records', 'readwrite', store => store.clear());
                await this.initMockData();
            },

            async resetLateCounts() {
                const students = await this.getAllStudents();
                for (const student of students) {
                    student.lateCount = 0;
                    await this.updateStudent(student);
                }
            }
        };

        // ==================== PickerService ====================
        const PickerService = {
            calculateWeight(student) {
                const baseWeight = 1;
                const lateWeight = 1 + (student.lateCount * 0.5);
                return Math.min(lateWeight, 5);
            },

            async pickStudent() {
                const students = await StorageService.getAllStudents();
                if (students.length === 0) {
                    throw new Error('没有学生数据');
                }

                const weights = students.map(s => this.calculateWeight(s));
                const totalWeight = weights.reduce((sum, w) => sum + w, 0);

                let random = Math.random() * totalWeight;

                for (let i = 0; i < students.length; i++) {
                    random -= weights[i];
                    if (random <= 0) {
                        return students[i];
                    }
                }

                return students[students.length - 1];
            }
        };

        // ==================== AppState ====================
        const AppState = {
            phase: 'IDLE',
            selectedStudent: null,
            students: [],
            todayRecords: [],

            setPhase(newPhase) {
                this.phase = newPhase;
                this.updateUI();
            },

            async refreshStudents() {
                this.students = await StorageService.getAllStudents();
            },

            async refreshTodayRecords() {
                this.todayRecords = await StorageService.getTodayRecords();
            },

            updateUI() {
                document.getElementById('total-count').textContent = this.students.length;
                document.getElementById('today-count').textContent = this.todayRecords.length;
                document.getElementById('late-count').textContent = this.todayRecords.filter(r => r.status === 'late').length;
                document.getElementById('start-btn').disabled = (this.phase !== 'IDLE');
            }
        };

        // ==================== RollCallController ====================
        const RollCallController = {
            nameElement: null,
            statusButtons: null,

            init() {
                this.nameElement = document.getElementById('student-name');
                this.statusButtons = document.getElementById('status-buttons');
            },

            async start() {
                if (AppState.phase !== 'IDLE') return;

                AppState.setPhase('SPINNING');

                // 加速旋转
                EarthController.setRotationSpeed(0.05);

                // 隐藏姓名和按钮
                this.hideAll();

                try {
                    // 选择学生
                    AppState.selectedStudent = await PickerService.pickStudent();

                    // 2秒后减速
                    setTimeout(() => {
                        EarthController.setRotationSpeed(0.002);
                    }, 2000);

                    // 2.5秒后显示姓名
                    setTimeout(() => {
                        this.showStudent();
                    }, 2500);

                } catch (error) {
                    console.error(error);
                    Utils.showToast('点名失败：' + error.message, true);
                    AppState.setPhase('IDLE');
                    EarthController.setRotationSpeed(0.002);
                }
            },

            showStudent() {
                AppState.setPhase('SHOWING');

                // 地球脉冲效果
                EarthController.pulseEarth();

                // 显示姓名
                this.nameElement.textContent = AppState.selectedStudent.name;
                this.nameElement.classList.add('show');

                // 显示状态按钮
                setTimeout(() => {
                    AppState.setPhase('SELECTING');
                    this.statusButtons.classList.add('show');
                }, 500);
            },

            async handleStatus(status) {
                if (AppState.phase !== 'SELECTING') return;

                // 保存记录
                const record = {
                    id: Utils.generateId(),
                    studentId: AppState.selectedStudent.id,
                    studentName: AppState.selectedStudent.name,
                    timestamp: Date.now(),
                    status: status
                };
                await StorageService.addRecord(record);

                // 更新学生迟到计数
                if (status === 'late') {
                    const student = AppState.students.find(s => s.id === AppState.selectedStudent.id);
                    if (student) {
                        student.lateCount = Math.min(student.lateCount + 1, 8);
                        await StorageService.updateStudent(student);
                    }
                }

                // 更新统计
                await AppState.refreshTodayRecords();
                await AppState.refreshStudents();
                AppState.updateUI();

                // 根据状态高亮地球
                const colorMap = {
                    'normal': 0x22c55e,
                    'late': 0xfbbf24,
                    'absent': 0xef4444
                };
                EarthController.highlightEarth(colorMap[status]);

                // 隐藏界面
                this.hideAll();

                // 2秒后重置状态
                setTimeout(() => {
                    AppState.setPhase('IDLE');
                    AppState.selectedStudent = null;
                    Utils.showToast(`已记录：${this.statusMap[status]}`);
                }, 2000);
            },

            hideAll() {
                this.nameElement.classList.remove('show');
                this.statusButtons.classList.remove('show');
            },

            statusMap: {
                'normal': '正常',
                'late': '迟到',
                'absent': '缺勤'
            }
        };

        // ==================== StudentManager ====================
        const StudentManager = {
            async showList() {
                const students = await StorageService.getAllStudents();
                const listEl = document.getElementById('student-list');

                if (students.length === 0) {
                    listEl.innerHTML = '<p style="text-align: center; color: #888;">暂无学生</p>';
                } else {
                    listEl.innerHTML = students.map(s => `
                        <div class="student-item" data-id="${s.id}">
                            <div class="student-info">
                                <span>${s.name}</span>
                                ${s.lateCount > 0 ? `<span class="student-late-badge">迟到${s.lateCount}次</span>` : ''}
                            </div>
                            <div class="student-actions">
                                <button class="btn btn-small btn-danger" onclick="StudentManager.deleteStudent('${s.id}')">删除</button>
                            </div>
                        </div>
                    `).join('');
                }

                this.showModal('students-modal');
            },

            async addStudent() {
                const input = document.getElementById('new-student-name');
                const name = input.value.trim();

                if (!name) {
                    Utils.showToast('请输入学生姓名', true);
                    return;
                }

                if (name.length > 10) {
                    Utils.showToast('姓名不能超过10个字符', true);
                    return;
                }

                const students = await StorageService.getAllStudents();
                if (students.some(s => s.name === name)) {
                    Utils.showToast('该学生已存在', true);
                    return;
                }

                await StorageService.addStudents([{
                    id: Utils.generateId(),
                    name: name,
                    lateCount: 0,
                    createdAt: Date.now()
                }]);

                input.value = '';
                await this.showList();
                await AppState.refreshStudents();
                AppState.updateUI();
                Utils.showToast('添加成功');
            },

            async deleteStudent(id) {
                await StorageService.deleteStudent(id);
                await this.showList();
                await AppState.refreshStudents();
                AppState.updateUI();
                Utils.showToast('删除成功');
            },

            showModal(modalId) {
                document.getElementById(modalId).classList.add('show');
            },

            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('show');
            }
        };

        // ==================== RecordManager ====================
        const RecordManager = {
            statusMap: {
                'normal': '正常',
                'late': '迟到',
                'absent': '缺勤'
            },

            async showList() {
                const records = await StorageService.getAllRecords();
                const listEl = document.getElementById('records-list');

                if (records.length === 0) {
                    listEl.innerHTML = '<p style="text-align: center; color: #888;">暂无记录</p>';
                } else {
                    listEl.innerHTML = records.map(r => `
                        <div class="record-item">
                            <span>${Utils.formatDateTime(r.timestamp)}</span>
                            <span>${r.studentName}</span>
                            <span class="record-status ${r.status}">${this.statusMap[r.status]}</span>
                        </div>
                    `).join('');
                }

                this.showModal('records-modal');
            },

            async exportCSV() {
                const records = await StorageService.getAllRecords();
                if (records.length === 0) {
                    Utils.showToast('没有记录可导出', true);
                    return;
                }

                let csv = '时间,姓名,状态\n';
                for (const record of records) {
                    const time = Utils.formatDateTime(record.timestamp);
                    const status = this.statusMap[record.status] || record.status;
                    csv += `${time},${record.studentName},${status}\n`;
                }

                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `点名记录_${Utils.getTodayString()}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                Utils.showToast(`已导出 ${records.length} 条记录`);
            },

            showModal(modalId) {
                document.getElementById(modalId).classList.add('show');
            },

            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('show');
            }
        };

        // ==================== ConfirmDialog ====================
        const ConfirmDialog = {
            callback: null,

            show(message, onConfirm) {
                document.getElementById('confirm-message').textContent = message;
                this.callback = onConfirm;
                this.showModal('confirm-modal');
            },

            async confirm() {
                if (this.callback) {
                    this.closeModal('confirm-modal');
                    await this.callback();
                    this.callback = null;
                }
            },

            cancel() {
                this.closeModal('confirm-modal');
                this.callback = null;
            },

            showModal(modalId) {
                document.getElementById(modalId).classList.add('show');
            },

            closeModal(modalId) {
                document.getElementById(modalId).classList.remove('show');
            }
        };

        // ==================== App ====================
        const App = {
            async init() {
                // 初始化3D地球
                EarthController.init();

                // 初始化数据
                await StorageService.init();
                await AppState.refreshStudents();
                await AppState.refreshTodayRecords();

                // 初始化控制器
                RollCallController.init();

                // 绑定事件
                this.bindEvents();

                // 更新UI
                AppState.updateUI();

                // 隐藏加载提示
                document.getElementById('loading').style.display = 'none';
            },

            bindEvents() {
                document.getElementById('start-btn').addEventListener('click', () => RollCallController.start());
                document.getElementById('manage-students-btn').addEventListener('click', () => StudentManager.showList());
                document.getElementById('add-student-btn').addEventListener('click', () => StudentManager.addStudent());
                document.getElementById('new-student-name').addEventListener('keypress', (e) => { if (e.key === 'Enter') StudentManager.addStudent(); });
                document.getElementById('view-records-btn').addEventListener('click', () => RecordManager.showList());
                document.getElementById('export-btn').addEventListener('click', () => RecordManager.exportCSV());
                document.getElementById('reset-late-btn').addEventListener('click', () => ConfirmDialog.show('确认重置所有学生的迟到计数？', async () => { await StorageService.resetLateCounts(); await AppState.refreshStudents(); AppState.updateUI(); Utils.showToast('迟到计数已重置'); }));
                document.getElementById('clear-data-btn').addEventListener('click', () => ConfirmDialog.show('确认清空所有数据？学生名单将重新初始化。', async () => { await StorageService.clearAll(); await AppState.refreshStudents(); await AppState.refreshTodayRecords(); AppState.updateUI(); Utils.showToast('数据已清空'); }));
                document.querySelectorAll('.status-btn').forEach(btn => { btn.addEventListener('click', (e) => { const status = e.target.dataset.status; RollCallController.handleStatus(status); }); });
                document.getElementById('close-students-btn').addEventListener('click', () => StudentManager.closeModal('students-modal'));
                document.getElementById('close-records-btn').addEventListener('click', () => RecordManager.closeModal('records-modal'));
                document.getElementById('confirm-cancel').addEventListener('click', () => ConfirmDialog.cancel());
                document.getElementById('confirm-ok').addEventListener('click', () => ConfirmDialog.confirm());
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { StudentManager.closeModal('students-modal'); RecordManager.closeModal('records-modal'); ConfirmDialog.cancel(); if (AppState.phase === 'SELECTING') RollCallController.hideAll(); } });
                document.querySelectorAll('.modal').forEach(modal => { modal.addEventListener('click', (e) => { if (e.target === modal) { modal.classList.remove('show'); ConfirmDialog.callback = null; } }); });
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
