<h2>配色风格选择</h2>
<p class="subtitle">选择整体视觉风格</p>

<div class="cards">
  <div class="card" data-choice="blue" onclick="toggleSelect(this)">
    <div class="card-body">
      <div class="mockup">
        <div class="mockup-header">商务蓝</div>
        <div class="mockup-body" style="padding: 40px; text-align: center;">
          <h1 style="margin-bottom: 30px; color: #1e3a8a;">五险一金计算器</h1>
          <div style="display: flex; flex-direction: column; gap: 12px; max-width: 280px; margin: 0 auto;">
            <div style="background: #2563eb; color: white; padding: 14px 24px; border-radius: 6px;">上传数据</div>
            <div style="background: #3b82f6; color: white; padding: 14px 24px; border-radius: 6px;">查看结果</div>
          </div>
        </div>
      </div>
      <h3>商务蓝</h3>
      <p>专业、可信，适合财务工具</p>
    </div>
  </div>

  <div class="card" data-choice="green" onclick="toggleSelect(this)">
    <div class="card-body">
      <div class="mockup">
        <div class="mockup-header">清新绿</div>
        <div class="mockup-body" style="padding: 40px; text-align: center;">
          <h1 style="margin-bottom: 30px; color: #065f46;">五险一金计算器</h1>
          <div style="display: flex; flex-direction: column; gap: 12px; max-width: 280px; margin: 0 auto;">
            <div style="background: #059669; color: white; padding: 14px 24px; border-radius: 6px;">上传数据</div>
            <div style="background: #10b981; color: white; padding: 14px 24px; border-radius: 6px;">查看结果</div>
          </div>
        </div>
      </div>
      <h3>清新绿</h3>
      <p>轻松、友好，降低工具的严肃感</p>
    </div>
  </div>

  <div class="card" data-choice="neutral" onclick="toggleSelect(this)">
    <div class="card-body">
      <div class="mockup">
        <div class="mockup-header">中性灰</div>
        <div class="mockup-body" style="padding: 40px; text-align: center;">
          <h1 style="margin-bottom: 30px; color: #374151;">五险一金计算器</h1>
          <div style="display: flex; flex-direction: column; gap: 12px; max-width: 280px; margin: 0 auto;">
            <div style="background: #4b5563; color: white; padding: 14px 24px; border-radius: 6px;">上传数据</div>
            <div style="background: #6b7280; color: white; padding: 14px 24px; border-radius: 6px;">查看结果</div>
          </div>
        </div>
      </div>
      <h3>中性灰</h3>
      <p>极简、低调，专注于功能本身</p>
    </div>
  </div>
</div>
